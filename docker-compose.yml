# Singing Video Generator — Docker Compose MVP
# Two containers: web (Next.js) + worker (Python)
# Shared volume: ./data for SQLite DB, uploads, and renders

services:
  web:
    build:
      context: ./web
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    volumes:
      - ./data:/data
    environment:
      - DATA_DIR=/data
      - DATABASE_URL=file:/data/sqlite.db
      - UPLOADS_DIR=/data/uploads
      - RENDERS_DIR=/data/renders
    depends_on:
      - worker
    restart: unless-stopped

  worker:
    build:
      context: ./worker
      dockerfile: Dockerfile
    volumes:
      - ./data:/data
    environment:
      - DATA_DIR=/data
      - DATABASE_PATH=/data/sqlite.db
      - UPLOADS_DIR=/data/uploads
    restart: unless-stopped
